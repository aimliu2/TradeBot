<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./script/tvjs3.css">
    <!-- Vue 3 is required -->
    <script src="./script/vue3529.js"></script>
    <script src="./script/tvjs3.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- Bind width and height to reactive variables -->
        <tvjs3 :data="chart" :width="width" :height="height" :key="stateKey">
        </tvjs3>
    </div>

    <script>

        const { createApp, ref, onMounted, onUnmounted } = Vue;
        const { TVJS3, DataCube } = window.TVJS3Lib;
        const dataPath = './data/dummy-data.json';


        createApp({
            setup() {
                // Initialize with empty data to avoid 'myData is undefined' error
                const chart = ref(new DataCube({ ohlcv: [] }));

                const width = ref(window.innerWidth);
                const height = ref(window.innerHeight);
                const stateKey = ref(0);

                const onResize = () => {
                    width.value = window.innerWidth;
                    height.value = window.innerHeight;
                    stateKey.value++;
                };

                const preventDefault = (e) => e.preventDefault();

                onMounted(async () => {
                    window.addEventListener('resize', onResize);

                    // Prevent default scrolling/context menu on body for smoother chart interaction
                    document.body.addEventListener('wheel', preventDefault, { passive: false });
                    // document.body.addEventListener('touchmove', preventDefault, { passive: false });
                    // document.body.addEventListener('contextmenu', preventDefault);

                    try {
                        const response = await fetch(dataPath);
                        const fetchedData = await response.json();
                        chart.value = new DataCube(fetchedData);
                        console.log("Data loaded successfully");
                    } catch (err) {
                        console.error("Failed to load data:", err);
                    }
                });

                onUnmounted(() => {
                    window.removeEventListener('resize', onResize);
                    document.body.removeEventListener('wheel', preventDefault);
                    // document.body.removeEventListener('touchmove', preventDefault);
                    // document.body.removeEventListener('contextmenu', preventDefault);
                });

                return { chart, width, height, stateKey };
            }
        })
            .component('tvjs3', TVJS3)
            .mount('#app');
    </script>

</body>

</html>
